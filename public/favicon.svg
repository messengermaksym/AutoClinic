<svg 
  viewBox="0 0 240 240" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    /* Light Theme (default) */
    .car-body {
      stroke: #5a3791;
    }
    .pulse-line {
      stroke: #0077b6;
    }
    .pulse-dot {
      fill: #0077b6;
    }

    /* Dark Theme */
    @media (prefers-color-scheme: dark) {
      .car-body {
        stroke: #ffffff;
      }
      .pulse-line {
        stroke: #00c6ff;
      }
      .pulse-dot {
        fill: #00c6ff;
      }
    }
  </style>

  <g transform="translate(0, 70)">
    <!-- Car Body (Roof and Hood) -->
    <path 
      class="car-body"
      d="M 25 70 C 10 70 15 45 25 45 L 45 40 L 80 20 L 130 20 L 180 40 L 215 45 C 225 45 230 70 215 70" 
      stroke-width="14" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Back and front bumper connectors to wheels -->
    <path 
      class="car-body"
      d="M 25 70 L 35 70" 
      stroke-width="14" 
      stroke-linecap="round" 
    />
    <path 
      class="car-body"
      d="M 205 70 L 215 70" 
      stroke-width="14" 
      stroke-linecap="round" 
    />

    <!-- Left Wheel Arc -->
    <path 
      class="car-body"
      d="M 35 70 A 20 20 0 1 0 75 70" 
      stroke-width="14" 
      stroke-linecap="round" 
    />
    
    <!-- Right Wheel Arc -->
    <path 
      class="car-body"
      d="M 165 70 A 20 20 0 1 0 205 70" 
      stroke-width="14" 
      stroke-linecap="round" 
    />

    <!-- Heartbeat EKG Line connecting the wheels -->
    <polyline 
      class="pulse-line"
      points="55,70 90,70 105,35 120,95 135,70 185,70" 
      stroke-width="12" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    
    <!-- Wheel centers (pulse dots) -->
    <circle class="pulse-dot" cx="55" cy="70" r="9" />
    <circle class="pulse-dot" cx="185" cy="70" r="9" />
  </g>
</svg>